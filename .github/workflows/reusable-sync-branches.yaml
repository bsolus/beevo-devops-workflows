# =============================================================================
# Reusable Sync Branches — create PR from source to target branch
# =============================================================================
# Replaces fragile curl-based sync workflows with the same pattern used by
# promote-to-k8s.yml (peter-evans/create-pull-request).
#
# Inputs:
#   source_branch  — branch with newer commits (e.g. staging)
#   target_branch  — branch to merge into (e.g. production)
# =============================================================================

name: "Reusable — Sync Branches"

on:
  workflow_call:
    inputs:
      source_branch:
        description: "Source branch (has new commits)"
        required: true
        type: string
      target_branch:
        description: "Target branch (to receive the merge)"
        required: true
        type: string
      pr_title:
        description: "PR title"
        required: false
        type: string
        default: ""
      pr_body:
        description: "PR body"
        required: false
        type: string
        default: ""
    secrets:
      gh_app_client_id:
        description: "GitHub App Client ID"
        required: true
      gh_app_private_key:
        description: "GitHub App Private Key"
        required: true
    outputs:
      pr_url:
        description: "URL of the created PR"
        value: ${{ jobs.sync.outputs.pr_url }}

jobs:
  sync:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_url: ${{ steps.pr.outputs.pull-request-url }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.gh_app_client_id }}
          private-key: ${{ secrets.gh_app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for differences
        id: diff
        run: |
          if git diff --quiet origin/${{ inputs.target_branch }}..origin/${{ inputs.source_branch }}; then
            echo "::notice::No differences between ${{ inputs.source_branch }} and ${{ inputs.target_branch }} — skipping."
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_diff=true" >> "$GITHUB_OUTPUT"

      - name: Determine PR title / body
        id: meta
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          TITLE="${{ inputs.pr_title }}"
          BODY="${{ inputs.pr_body }}"
          if [ -z "$TITLE" ]; then
            TITLE="Sync ${{ inputs.source_branch }} → ${{ inputs.target_branch }}"
          fi
          if [ -z "$BODY" ]; then
            BODY="Automated sync of ${{ inputs.source_branch }} into ${{ inputs.target_branch }}."
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "body=${BODY}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: pr
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: ${{ inputs.target_branch }}
          branch: sync/${{ inputs.source_branch }}-to-${{ inputs.target_branch }}
          title: ${{ steps.meta.outputs.title }}
          body: ${{ steps.meta.outputs.body }}
          commit-message: "chore: sync ${{ inputs.source_branch }} → ${{ inputs.target_branch }}"
          author: "Beevo Bot <bot@beevo.pt>"
          delete-branch: true
          draft: false

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.has_diff }}" = "false" ]; then
            echo "## ℹ️ Sync skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "No changes between **${{ inputs.source_branch }}** and **${{ inputs.target_branch }}**." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## ✅ Sync PR created" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.pr.outputs.pull-request-url }}" ]; then
            echo "- **PR:** ${{ steps.pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
